name: Type Check

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths:
      - "server/**/*.py"
      - "agent/**/*.py"
      - "pyproject.toml"

jobs:
  typecheck:
    name: mypy --strict
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install mypy

      - name: Run mypy
        run: mypy server/ agent/ --strict
