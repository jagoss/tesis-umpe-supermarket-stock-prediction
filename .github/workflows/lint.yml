name: Lint

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths:
      - "server/**/*.py"
      - "agent/**/*.py"
      - "pyproject.toml"

jobs:
  lint:
    name: ruff + black + isort
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install "ruff>=0.4" "black>=24.0" "isort>=5.13"

      - name: Ruff check
        run: ruff check server/ agent/ --output-format=github

      - name: Black check
        run: black --check --diff server/ agent/

      - name: isort check
        run: isort --check --diff server/ agent/
