name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # Required to push to GitHub Container Registry

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # The parquet data files are not committed to the repo (.gitignore /data/).
      # They are stored as assets on the GitHub Release tagged "data-latest".
      # To update the data files, delete the old release and re-create it:
      #   gh release delete data-latest --yes
      #   gh release create data-latest \
      #     data/precomputed_features.parquet data/scaler_params.parquet \
      #     --title "Data files" --notes "Pre-computed features and scaler params"
      - name: Download data files from release
        run: |
          mkdir -p data
          gh release download data-latest \
            --pattern "precomputed_features.parquet" \
            --pattern "scaler_params.parquet" \
            --dir data/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # Tag with the short commit SHA (e.g. sha-a1b2c3d)
            type=sha,prefix=sha-
            # Always update the "latest" tag on main
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache speeds up subsequent builds significantly
          cache-from: type=gha
          cache-to: type=gha,mode=max
